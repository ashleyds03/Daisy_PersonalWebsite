<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8a0d0"/>
      <stop offset="100%" stop-color="#a090d8"/>
    </linearGradient>
  </defs>
  <!-- rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- A letter -->
  <text x="16" y="22" font-family="Georgia, serif" font-size="18" font-weight="400" fill="white" text-anchor="middle">A</text>
  <!-- sparkles -->
  <text x="6" y="9" font-family="serif" font-size="7" fill="rgba(255,255,255,0.9)">✦</text>
  <text x="23" y="27" font-family="serif" font-size="5" fill="rgba(255,255,255,0.7)">✦</text>
</svg>
